name: Build and publish Docker images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/cleitonpcarvalho/gmapscrap-saas-backend
  FRONTEND_IMAGE: ghcr.io/cleitonpcarvalho/gmapscrap-saas-frontend
  NEXT_PUBLIC_API_BASE_URL: https://api.automasoluct.com.br

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build \
            --pull \
            --file Dockerfile.backend \
            --label org.opencontainers.image.source=https://github.com/cleitonpcarvalho/gmapscrap-saas \
            --label org.opencontainers.image.description="GmapScrap SaaS backend" \
            --tag "${BACKEND_IMAGE}:latest" \
            --tag "${BACKEND_IMAGE}:${GITHUB_SHA}" \
            .
          docker push "${BACKEND_IMAGE}:latest"
          docker push "${BACKEND_IMAGE}:${GITHUB_SHA}"

      - name: Build and push frontend image
        run: |
          docker build \
            --pull \
            --file ./frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE_URL="${NEXT_PUBLIC_API_BASE_URL}" \
            --label org.opencontainers.image.source=https://github.com/cleitonpcarvalho/gmapscrap-saas \
            --label org.opencontainers.image.description="GmapScrap SaaS frontend" \
            --tag "${FRONTEND_IMAGE}:latest" \
            --tag "${FRONTEND_IMAGE}:${GITHUB_SHA}" \
            ./frontend
          docker push "${FRONTEND_IMAGE}:latest"
          docker push "${FRONTEND_IMAGE}:${GITHUB_SHA}"
