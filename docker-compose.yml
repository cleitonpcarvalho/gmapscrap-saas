services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gmapscrap
      POSTGRES_USER: gmapscrap
      POSTGRES_PASSWORD: gmapscrap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gmapscrap -d gmapscrap"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgresql+psycopg://gmapscrap:gmapscrap@postgres:5432/gmapscrap
      APP_USERNAME: "${APP_USERNAME:-cleiton.carvalho@automasoluct.com.br}"
      APP_PASSWORD: "${APP_PASSWORD:-change-this-password}"
      SESSION_SECRET: "${SESSION_SECRET:-local-dev-session-secret-change-me}"
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
      CHROME_BIN: /usr/bin/chromium
      CHROMEDRIVER_BIN: /usr/bin/chromedriver
      SELENIUM_HEADLESS: "true"
      CONTACT_EMAIL: "${CONTACT_EMAIL:-contato@automasoluct.com.br}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5.6}"
      PUBLIC_BASE_URL: http://localhost:8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
