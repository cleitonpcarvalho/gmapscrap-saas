services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: "${DATABASE_URL:-}"
      DB_HOST: "${DB_HOST:?defina DB_HOST no .env}"
      DB_PORT: "${DB_PORT:-5432}"
      DB_NAME: "${DB_NAME:-postgres}"
      DB_USER: "${DB_USER:-postgres}"
      DB_PASSWORD: "${DB_PASSWORD:?defina DB_PASSWORD no .env}"
      DB_SSLMODE: "${DB_SSLMODE:-require}"
      APP_USERNAME: "${APP_USERNAME:-cleiton.carvalho@automasoluct.com.br}"
      APP_PASSWORD: "${APP_PASSWORD:-change-this-password}"
      SESSION_SECRET: "${SESSION_SECRET:-local-dev-session-secret-change-me}"
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
      CHROME_BIN: /usr/bin/chromium
      CHROMEDRIVER_BIN: /usr/bin/chromedriver
      SELENIUM_HEADLESS: "true"
      CONTACT_EMAIL: "${CONTACT_EMAIL:-contato@automasoluct.com.br}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5.6}"
      SUPABASE_URL: "${SUPABASE_URL:-}"
      SUPABASE_PUBLISHABLE_KEY: "${SUPABASE_PUBLISHABLE_KEY:-}"
      SUPABASE_SECRET_KEY: "${SUPABASE_SECRET_KEY:-}"
      SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY:-}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY:-}"
      SUPABASE_STORAGE_BUCKET: "${SUPABASE_STORAGE_BUCKET:-gmapscrap}"
      PUBLIC_BASE_URL: http://localhost:8000
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3001:3000"
    depends_on:
      - backend
