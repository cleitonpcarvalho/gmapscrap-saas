services:
  backend:
    image: ghcr.io/cleitonpcarvalho/gmapscrap-saas-backend:latest
    labels:
      - traefik.enable=true
      - traefik.docker.network=AutomaNet
      - traefik.swarm.network=AutomaNet
      - traefik.http.routers.gmapscrap-api.rule=Host(`api.automasoluct.com.br`)
      - traefik.http.routers.gmapscrap-api.entrypoints=websecure
      - traefik.http.routers.gmapscrap-api.tls=true
      - traefik.http.routers.gmapscrap-api.tls.certresolver=letsencryptresolver
      - traefik.http.services.gmapscrap-api.loadbalancer.server.port=8000
    environment:
      DATABASE_URL: "${DATABASE_URL:-}"
      DB_HOST: "${DB_HOST:?defina DB_HOST do Supabase no Portainer}"
      DB_PORT: "${DB_PORT:-5432}"
      DB_NAME: "${DB_NAME:-postgres}"
      DB_USER: "${DB_USER:-postgres}"
      DB_PASSWORD: "${DB_PASSWORD:?defina DB_PASSWORD do Supabase no Portainer}"
      DB_SSLMODE: "${DB_SSLMODE:-require}"
      APP_USERNAME: "${APP_USERNAME:?defina APP_USERNAME no Portainer}"
      APP_PASSWORD: "${APP_PASSWORD:?defina APP_PASSWORD no Portainer}"
      SESSION_SECRET: "${SESSION_SECRET:?defina SESSION_SECRET no Portainer}"
      SESSION_COOKIE_SECURE: "true"
      CORS_ORIGINS: "https://gmapscrap.automasoluct.com.br"
      CHROME_BIN: /usr/bin/chromium
      CHROMEDRIVER_BIN: /usr/bin/chromedriver
      SELENIUM_HEADLESS: "true"
      CONTACT_EMAIL: "${CONTACT_EMAIL:-contato@automasoluct.com.br}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5.6}"
      SUPABASE_URL: "${SUPABASE_URL:-}"
      SUPABASE_PUBLISHABLE_KEY: "${SUPABASE_PUBLISHABLE_KEY:-}"
      SUPABASE_SECRET_KEY: "${SUPABASE_SECRET_KEY:-}"
      SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY:-}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY:-}"
      SUPABASE_STORAGE_BUCKET: "${SUPABASE_STORAGE_BUCKET:-gmapscrap}"
      EVOLUTION_API_BASE_URL: "${EVOLUTION_API_BASE_URL:-}"
      EVOLUTION_API_KEY: "${EVOLUTION_API_KEY:-}"
      EVOLUTION_INSTANCE_NAME: "${EVOLUTION_INSTANCE_NAME:-}"
      WHATSAPP_VALIDATION_TIMEOUT_SECONDS: "${WHATSAPP_VALIDATION_TIMEOUT_SECONDS:-6}"
      PUBLIC_BASE_URL: "https://api.automasoluct.com.br"
    networks:
      - proxy
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      labels:
        - traefik.enable=true
        - traefik.docker.network=AutomaNet
        - traefik.swarm.network=AutomaNet
        - traefik.http.routers.gmapscrap-api.rule=Host(`api.automasoluct.com.br`)
        - traefik.http.routers.gmapscrap-api.entrypoints=websecure
        - traefik.http.routers.gmapscrap-api.tls=true
        - traefik.http.routers.gmapscrap-api.tls.certresolver=letsencryptresolver
        - traefik.http.services.gmapscrap-api.loadbalancer.server.port=8000

  frontend:
    image: ghcr.io/cleitonpcarvalho/gmapscrap-saas-frontend:latest
    labels:
      - traefik.enable=true
      - traefik.docker.network=AutomaNet
      - traefik.swarm.network=AutomaNet
      - traefik.http.routers.gmapscrap-web.rule=Host(`gmapscrap.automasoluct.com.br`)
      - traefik.http.routers.gmapscrap-web.entrypoints=websecure
      - traefik.http.routers.gmapscrap-web.tls=true
      - traefik.http.routers.gmapscrap-web.tls.certresolver=letsencryptresolver
      - traefik.http.services.gmapscrap-web.loadbalancer.server.port=3000
    environment:
      NEXT_PUBLIC_API_BASE_URL: "https://api.automasoluct.com.br"
    networks:
      - proxy
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      labels:
        - traefik.enable=true
        - traefik.docker.network=AutomaNet
        - traefik.swarm.network=AutomaNet
        - traefik.http.routers.gmapscrap-web.rule=Host(`gmapscrap.automasoluct.com.br`)
        - traefik.http.routers.gmapscrap-web.entrypoints=websecure
        - traefik.http.routers.gmapscrap-web.tls=true
        - traefik.http.routers.gmapscrap-web.tls.certresolver=letsencryptresolver
        - traefik.http.services.gmapscrap-web.loadbalancer.server.port=3000

networks:
  proxy:
    external: true
    name: AutomaNet
